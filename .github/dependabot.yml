version: 2
updates:
  # JS dependencies (pnpm — uses the "npm" ecosystem, reads pnpm-lock.yaml).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    # Keep commit subjects valid Conventional Commits so commitlint passes and
    # release-please maps them (CONTRIBUTING.md → "Стиль коммитов").
    commit-message:
      prefix: 'deps'

  # GitHub Actions used in workflows.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'ci'
